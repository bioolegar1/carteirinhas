@if (card(); as studentCard) {
  <button
    class="fullscreen-btn"
    type="button"
    [attr.aria-label]="fullscreenActive() ? 'Sair da tela cheia' : 'Abrir em tela cheia'"
    [attr.title]="fullscreenActive() ? 'Sair da tela cheia' : 'Tela cheia'"
    (click)="toggleFullscreen()"
  >
    <span aria-hidden="true"></span>
  </button>

  <main class="scene-wrap">
    <app-student-card [card]="studentCard" />
  </main>
} @else {
  <main class="not-found" aria-live="polite">
    <h1>Carteirinha nao encontrada</h1>
    <p>Verifique o link recebido e tente novamente.</p>
  </main>
}
